<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoLens Pro | Map Stamp Camera</title>
    
    <!-- Modern Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap');

        :root {
            --bg-dark: #090b0f;
            --card-bg: #151821;
            --primary: #00e5ff;
            --primary-glow: rgba(0, 229, 255, 0.4);
            --text-main: #ffffff;
            --text-sub: #8b95a5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        /* Mobile View Container */
        .app-container {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            background-color: var(--bg-dark);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        @media (min-width: 431px) {
            .app-container {
                height: 90vh;
                border-radius: 40px;
                border: 8px solid #222;
                box-shadow: 0 0 50px rgba(0,229,255,0.1);
            }
        }

        /* Header */
        header {
            padding: 25px 20px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo { font-size: 1.2rem; font-weight: 700; }
        .logo i { color: var(--primary); margin-right: 5px; }

        /* Dashboard */
        .screen {
            flex: 1;
            display: none;
            flex-direction: column;
            padding: 20px;
            animation: fadeIn 0.4s ease;
        }
        .screen.active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Info Card */
        .location-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            position: relative;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 15px;
            background: rgba(0,229,255,0.1);
            padding: 6px 12px;
            border-radius: 20px;
        }
        .status i { animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .city { font-size: 1.6rem; font-weight: 700; margin-bottom: 5px; }
        .address { font-size: 0.85rem; color: var(--text-sub); margin-bottom: 20px; line-height: 1.4; }

        .coords { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .coord-box p { font-size: 0.7rem; color: var(--text-sub); text-transform: uppercase; }
        .coord-box h4 { font-size: 0.95rem; margin-top: 3px; }

        /* Action Buttons */
        .actions { margin-top: auto; padding-bottom: 20px; display: flex; flex-direction: column; gap: 12px; }
        
        .btn {
            border: none; padding: 18px; border-radius: 16px; font-size: 1.05rem; font-weight: 600;
            cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px;
            transition: 0.2s;
        }
        .btn-primary { background: var(--primary); color: #000; box-shadow: 0 8px 25px var(--primary-glow); }
        .btn-primary:active { transform: scale(0.96); }
        
        .btn-secondary { background: var(--card-bg); color: #fff; border: 1px solid rgba(255,255,255,0.1); }

        /* Preview Screen */
        .preview-box { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        #result-img { max-width: 100%; max-height: 70vh; border-radius: 12px; object-fit: contain; }

        /* Hidden */
        input[type="file"], canvas { display: none; }
        
        #loading-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 100; display: none; 
            flex-direction: column; justify-content: center; align-items: center;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--text-sub); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="logo"><i class="fa-solid fa-crosshairs"></i> GeoLens Map-Pro</div>
            <button id="btn-back" class="btn-secondary" style="display:none; padding: 8px 15px; border-radius: 20px;" onclick="showHome()">
                <i class="fa-solid fa-arrow-left"></i> Back
            </button>
        </header>

        <!-- DASHBOARD -->
        <div id="screen-home" class="screen active">
            <div class="location-card">
                <div class="status"><i class="fa-solid fa-satellite-dish"></i> Live GPS Active</div>
                <h2 class="city" id="city-text">Locating...</h2>
                <p class="address" id="address-text">Fetching exact location data...</p>

                <div class="coords">
                    <div class="coord-box"><p>Latitude</p><h4 id="lat-text">--.----</h4></div>
                    <div class="coord-box"><p>Longitude</p><h4 id="lng-text">--.----</h4></div>
                    <div class="coord-box"><p>Altitude</p><h4 id="alt-text">-- m</h4></div>
                    <div class="coord-box"><p>Accuracy</p><h4 id="acc-text">± -- m</h4></div>
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-primary" onclick="document.getElementById('camera-input').click()">
                    <i class="fa-solid fa-camera"></i> Capture & Add Map Stamp
                </button>
                <button class="btn btn-secondary" onclick="document.getElementById('gallery-input').click()">
                    <i class="fa-solid fa-image"></i> Stamp Existing Photo
                </button>
                <input type="file" id="camera-input" accept="image/*" capture="environment">
                <input type="file" id="gallery-input" accept="image/*">
            </div>
        </div>

        <!-- PREVIEW -->
        <div id="screen-preview" class="screen">
            <div class="preview-box">
                <img id="result-img" src="" alt="Geotagged Photo">
                <button class="btn btn-primary" style="width: 100%;" onclick="downloadPhoto()">
                    <i class="fa-solid fa-download"></i> Save Photo to Gallery
                </button>
            </div>
        </div>

        <canvas id="canvas"></canvas>
        <div id="loading-overlay">
            <div class="spinner"></div>
            <p style="margin-top: 15px; font-weight: 600;">Generating Map Stamp...</p>
        </div>
    </div>

    <script>
        let geo = { lat: 0, lng: 0, alt: 0, acc: 0, city: "Unknown City", address: "Location Details Unavailable" };

        // 1. Get Live Location & Address
        function initGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(async (pos) => {
                    geo.lat = pos.coords.latitude;
                    geo.lng = pos.coords.longitude;
                    geo.alt = pos.coords.altitude || 0;
                    geo.acc = pos.coords.accuracy;

                    document.getElementById('lat-text').innerText = geo.lat.toFixed(6);
                    document.getElementById('lng-text').innerText = geo.lng.toFixed(6);
                    document.getElementById('alt-text').innerText = geo.alt ? `${geo.alt.toFixed(1)} m` : 'Sea Level';
                    document.getElementById('acc-text').innerText = `± ${geo.acc.toFixed(0)} m`;

                    try {
                        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${geo.lat}&lon=${geo.lng}&zoom=18&addressdetails=1`);
                        const data = await res.json();
                        if (data && data.address) {
                            geo.city = data.address.city || data.address.town || data.address.village || data.address.county || "Local Area";
                            geo.address = `${data.address.road || ''}, ${data.address.state || ''}, ${data.address.country || ''}`.replace(/^, /, '');
                            
                            document.getElementById('city-text').innerText = geo.city;
                            document.getElementById('address-text').innerText = geo.address;
                        }
                    } catch (e) { console.log("Geocode Error"); }
                }, () => alert("Please turn on GPS Location!"), { enableHighAccuracy: true });
            }
        }

        // 2. Handle Image Upload
        document.getElementById('camera-input').addEventListener('change', processImage);
        document.getElementById('gallery-input').addEventListener('change', processImage);

        function processImage(e) {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('loading-overlay').style.display = 'flex';
            
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => createMapStamp(img);
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        }

        // 3. Tile Math (Convert Lat/Lng to Map Image)
        function getMapTileData(lat, lng) {
            const zoom = 15;
            const n = Math.pow(2, zoom);
            const exactX = ((lng + 180) / 360) * n;
            const latRad = lat * Math.PI / 180;
            const exactY = (1 - (Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI)) / 2 * n;

            const tileX = Math.floor(exactX);
            const tileY = Math.floor(exactY);

            // Pixel offset inside the tile
            const pixelX = (exactX - tileX) * 256;
            const pixelY = (exactY - tileY) * 256;

            // Free Dark Mode Map Tile URL (Supports CORS)
            const tileUrl = `https://a.basemaps.cartocdn.com/dark_all/${zoom}/${tileX}/${tileY}.png`;

            return { url: tileUrl, px: pixelX, py: pixelY };
        }

        // 4. Draw Canvas Stamp (Photo + Text + Mini Map)
        function createMapStamp(photoImg) {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');

            canvas.width = photoImg.width;
            canvas.height = photoImg.height;
            ctx.drawImage(photoImg, 0, 0, canvas.width, canvas.height);

            // Responsive Scaling based on Image resolution
            const scale = canvas.width / 1080;
            const pad = 40 * scale;
            const stampH = 320 * scale;
            const stampW = canvas.width - (pad * 2);
            const stampY = canvas.height - stampH - pad;

            // Draw Background Glass Card
            ctx.fillStyle = "rgba(15, 17, 21, 0.85)"; // Dark premium BG
            ctx.beginPath();
            ctx.roundRect(pad, stampY, stampW, stampH, 20 * scale);
            ctx.fill();

            // Accent Line
            ctx.fillStyle = "#00e5ff";
            ctx.beginPath();
            ctx.roundRect(pad, stampY, 15 * scale, stampH, [20*scale, 0, 0, 20*scale]);
            ctx.fill();

            // Fetch Live Map Tile
            const tileData = getMapTileData(geo.lat, geo.lng);
            const mapImg = new Image();
            mapImg.crossOrigin = "anonymous"; // IMPORTANT to prevent Canvas Security Error
            
            mapImg.onload = () => {
                
                // ---- DRAW TEXT ON LEFT SIDE ----
                const textX = pad + 40 * scale;
                ctx.fillStyle = "#ffffff";
                ctx.textBaseline = "top";
                
                // City
                ctx.font = `bold ${50 * scale}px 'Inter', sans-serif`;
                ctx.fillText(geo.city.toUpperCase(), textX, stampY + 30 * scale);
                
                // Address
                ctx.fillStyle = "#8b95a5";
                ctx.font = `500 ${24 * scale}px 'Inter', sans-serif`;
                ctx.fillText(geo.address.substring(0, 45) + "...", textX, stampY + 90 * scale);

                // Coordinates Grid
                ctx.fillStyle = "#ffffff";
                ctx.font = `bold ${26 * scale}px 'Inter', monospace`;
                const dateStr = new Date().toLocaleDateString('en-GB');
                const timeStr = new Date().toLocaleTimeString('en-US', {hour: '2-digit', minute:'2-digit'});

                const row1 = stampY + 160 * scale;
                const row2 = stampY + 210 * scale;
                const col2 = textX + 300 * scale;

                ctx.fillText(`LAT: ${geo.lat.toFixed(6)}`, textX, row1);
                ctx.fillText(`LNG: ${geo.lng.toFixed(6)}`, textX, row2);
                ctx.fillText(`DATE: ${dateStr}`, col2, row1);
                ctx.fillText(`TIME: ${timeStr}`, col2, row2);

                // Footer data
                ctx.fillStyle = "#00e5ff";
                ctx.font = `bold ${20 * scale}px 'Inter', sans-serif`;
                ctx.fillText(`ALTITUDE: ${geo.alt.toFixed(1)}m   |   ACCURACY: ±${geo.acc.toFixed(0)}m`, textX, stampY + 265 * scale);


                // ---- DRAW MINI MAP ON RIGHT SIDE ----
                const mapSize = stampH - (40 * scale); // Square map
                const mapX = pad + stampW - mapSize - (20 * scale);
                const mapY = stampY + (20 * scale);

                ctx.save();
                // Create rounded clip for Map
                ctx.beginPath();
                ctx.roundRect(mapX, mapY, mapSize, mapSize, 15 * scale);
                ctx.clip();

                // Draw Map Image (Scale 256px tile to fit mapSize)
                const tileScale = mapSize / 256;
                ctx.drawImage(mapImg, mapX, mapY, 256 * tileScale, 256 * tileScale);

                // Draw Pin exactly on location
                const pinDrawX = mapX + (tileData.px * tileScale);
                const pinDrawY = mapY + (tileData.py * tileScale);
                
                // Pin glow
                ctx.shadowColor = "#00e5ff";
                ctx.shadowBlur = 15 * scale;
                
                // Pin Body
                ctx.beginPath();
                ctx.arc(pinDrawX, pinDrawY, 12 * scale, 0, 2 * Math.PI);
                ctx.fillStyle = "#00e5ff";
                ctx.fill();
                
                // Pin inner dot
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.arc(pinDrawX, pinDrawY, 5 * scale, 0, 2 * Math.PI);
                ctx.fillStyle = "#000";
                ctx.fill();

                ctx.restore(); // Remove clipping

                // Map Border
                ctx.strokeStyle = "rgba(255,255,255,0.2)";
                ctx.lineWidth = 3 * scale;
                ctx.beginPath();
                ctx.roundRect(mapX, mapY, mapSize, mapSize, 15 * scale);
                ctx.stroke();

                // Finish and show UI
                document.getElementById('result-img').src = canvas.toDataURL('image/jpeg', 0.95);
                document.getElementById('loading-overlay').style.display = 'none';
                showPreview();
            };

            // Error fallback agar internet slow ho
            mapImg.onerror = () => {
                alert("Map load nahi ho paya (Check Internet). Picture bina map ke save ho rahi hai.");
                document.getElementById('result-img').src = canvas.toDataURL('image/jpeg', 0.95);
                document.getElementById('loading-overlay').style.display = 'none';
                showPreview();
            };
            
            mapImg.src = tileData.url;
        }

        // Navigation
        function showPreview() {
            document.getElementById('screen-home').classList.remove('active');
            document.getElementById('screen-preview').classList.add('active');
            document.getElementById('btn-back').style.display = 'block';
        }

        function showHome() {
            document.getElementById('screen-preview').classList.remove('active');
            document.getElementById('screen-home').classList.add('active');
            document.getElementById('btn-back').style.display = 'none';
            document.getElementById('camera-input').value = ""; 
            document.getElementById('gallery-input').value = "";
        }

        function downloadPhoto() {
            const link = document.createElement('a');
            link.download = `GeoLens_Map_${Date.now()}.jpg`;
            link.href = document.getElementById('canvas').toDataURL('image/jpeg', 1.0);
            link.click();
        }

        window.onload = initGPS;
    </script>
</body>
</html>
